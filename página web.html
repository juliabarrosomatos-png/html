<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Palavra e Calculadora</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { margin-bottom: 30px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 200px; padding: 5px; margin-bottom: 10px; }
        .resultado { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <label for="palavra">Digite uma palavra:</label>
        <input type="text" id="palavra" oninput="mostrarPalavra()" placeholder="Digite aqui">
        <div class="resultado" id="palavraMostrada"></div>
    </div>

    <div class="container">
        <label for="num1">Número 1:</label>
        <input type="number" id="num1" oninput="calcularSoma()" placeholder="Digite o primeiro número">
        <label for="num2">Número 2:</label>
        <input type="number" id="num2" oninput="calcularSoma()" placeholder="Digite o segundo número">
        <div class="resultado">
            soma: <span id="resultadoSoma">0</span>
        </div>
    </div>

    <script>
        function mostrarPalavra() {
            const palavra = document.getElementById('palavra').value;
            document.getElementById('palavraMostrada').textContent = palavra;
        }

        function calcularSoma() {
            const num1 = parseFloat(document.getElementById('num1').value) || 0;
            const num2 = parseFloat(document.getElementById('num2').value) || 0;
            document.getElementById('resultadoSoma').textContent = num1 + num2;
        }
    </script>
</body>
</html>
